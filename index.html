<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烤馒头求职工具箱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", system-ui, sans-serif;
  background: #fdf9f4;
  color: #2c2420;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.card {
  background: #fffcf8;
  border-radius: 20px;
  padding: 40px 28px 32px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 2px 12px rgba(44,36,32,0.06), 0 8px 32px rgba(44,36,32,0.04);
  text-align: center;
}

/* 顶部短装饰线 */
.card::before {
  content: '';
  display: block;
  width: 36px;
  height: 3px;
  border-radius: 2px;
  background: #1a6b5a;
  margin: 0 auto 24px;
}

h1 {
  font-size: 1.4rem;
  font-weight: 800;
  color: #1a6b5a;
  margin-bottom: 28px;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== 按钮基础 ===== */
.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px 16px;
  border-radius: 12px;
  border: 1.5px solid;
  background: #fffcf8;
  text-decoration: none;
  color: #2c2420;
  text-align: left;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ===== 三个按钮各自颜色 ===== */
.btn-guide {
  border-color: rgba(193,125,90,0.35);
}

.btn-form {
  border-color: rgba(74,139,122,0.35);
}

.btn-resume {
  border-color: rgba(26,107,90,0.35);
}

/* 按压态 */
.btn-guide:active  { background: rgba(193,125,90,0.08); }
.btn-form:active   { background: rgba(74,139,122,0.08); }
.btn-resume:active { background: rgba(26,107,90,0.08); }

/* ===== 左侧竖条 ===== */
.btn-stripe {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  flex-shrink: 0;
}

.stripe-guide  { background: #c17d5a; }
.stripe-form   { background: #4a8b7a; }
.stripe-resume { background: #1a6b5a; }

/* ===== 内容区 ===== */
.btn-body { flex: 1; min-width: 0; }

.btn-title {
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.4;
}

.btn-desc {
  font-size: 0.72rem;
  color: #9e9286;
  line-height: 1.4;
  margin-top: 1px;
}

.btn-arrow {
  color: #c4b8a8;
  font-size: 1.1rem;
  flex-shrink: 0;
}

/* ===== Footer ===== */
.footer {
  margin-top: 24px;
  padding-top: 16px;
  font-size: 0.68rem;
  color: #bfb2a2;
  border-top: 1px solid #f0e8dc;
}

@media (max-width: 380px) {
  .card { padding: 32px 20px 24px; border-radius: 16px; }
  h1 { font-size: 1.25rem; margin-bottom: 22px; }
  .btn { padding: 14px 12px; gap: 8px; }
  .btn-title { font-size: 0.88rem; }
  .btn-desc { font-size: 0.68rem; }
}
</style>
</head>
<body>

<div class="card">
  <h1>烤馒头求职工具箱</h1>

  <div class="buttons">
    <a href="指南.html" class="btn btn-guide">
      <span class="btn-stripe stripe-guide"></span>
      <span class="btn-body">
        <span class="btn-title">求职指南</span>
        <span class="btn-desc">岗位选择、简历建议、常见问题</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>

    <a href="信息收集.html" class="btn btn-form">
      <span class="btn-stripe stripe-form"></span>
      <span class="btn-body">
        <span class="btn-title">信息收集</span>
        <span class="btn-desc">选择题形式，帮我更了解你的情况</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>

    <a href="简历生成器.html" class="btn btn-resume">
      <span class="btn-stripe stripe-resume"></span>
      <span class="btn-body">
        <span class="btn-title">简历生成器</span>
        <span class="btn-desc">编辑简历，下载PDF文件</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>
  </div>

  <p class="footer">数据仅保存在你的浏览器中</p>
</div>

</body>
</html>
