<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烤馒头求职工具箱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", system-ui, sans-serif;
  background: #fdf9f4;
  color: #2c2420;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 44px 32px 36px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(44,36,32,0.07);
  text-align: center;
}

h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: #1a6b5a;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 0.88rem;
  color: #8a8178;
  margin-bottom: 32px;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 22px;
  border-radius: 14px;
  border: 2px solid #e8ddd0;
  background: #fff;
  cursor: pointer;
  text-decoration: none;
  color: #2c2420;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover, .btn:active {
  border-color: #1a6b5a;
  background: #f6faf8;
  transform: translateY(-1px);
}

.btn-icon {
  font-size: 1.6rem;
  flex-shrink: 0;
  line-height: 1;
}

.btn-body {
  text-align: left;
  flex: 1;
}

.btn-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.4;
}

.btn-desc {
  font-size: 0.78rem;
  color: #8a8178;
  line-height: 1.4;
  margin-top: 2px;
}

.btn-arrow {
  color: #c4b8a8;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.footer {
  margin-top: 28px;
  font-size: 0.75rem;
  color: #b8ada0;
}
</style>
</head>
<body>

<div class="card">
  <h1>烤馒头求职工具箱</h1>
  <p class="subtitle">选一个开始</p>

  <div class="buttons">
    <a href="指南.html" class="btn">
      <span class="btn-icon">&#x1F4CB;</span>
      <span class="btn-body">
        <span class="btn-title">求职指南</span>
        <span class="btn-desc">岗位选择、简历建议、常见问题</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>

    <a href="信息收集.html" class="btn">
      <span class="btn-icon">&#x270F;&#xFE0F;</span>
      <span class="btn-body">
        <span class="btn-title">信息收集</span>
        <span class="btn-desc">填一些选择题，帮我更了解你的情况</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>

    <a href="简历生成器.html" class="btn">
      <span class="btn-icon">&#x1F4C4;</span>
      <span class="btn-body">
        <span class="btn-title">简历生成器</span>
        <span class="btn-desc">编辑简历内容，下载PDF</span>
      </span>
      <span class="btn-arrow">&#x203A;</span>
    </a>
  </div>

  <p class="footer">数据仅保存在你的浏览器中</p>
</div>

</body>
</html>
